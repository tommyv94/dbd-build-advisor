name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:desktop:win

      - name: Verify Windows release artifacts
        shell: pwsh
        run: |
          $yml = Get-ChildItem dist-electron/latest.yml -ErrorAction SilentlyContinue
          $exe = Get-ChildItem dist-electron/*Setup*.exe -ErrorAction SilentlyContinue
          if (-not $yml) { throw 'Missing dist-electron/latest.yml' }
          if (-not $exe) { throw 'Missing Windows Setup .exe' }
          Write-Host "Windows artifacts OK: $($exe.Name), latest.yml"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist-electron/latest.yml
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build:desktop:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify macOS release artifacts
        run: |
          test -f dist-electron/latest-mac.yml
          test -n "$(find dist-electron -maxdepth 1 -name '*.dmg' -print -quit)"
          echo "macOS artifacts OK"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist-electron/latest-mac.yml
            dist-electron/*.dmg
            dist-electron/*.dmg.blockmap
            dist-electron/*.zip
            dist-electron/*.zip.blockmap
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-installer'
          path: dist-electron
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"

          echo "## Release assets for $TAG" >> "$GITHUB_STEP_SUMMARY"
          ls -la dist-electron/ | tee -a "$GITHUB_STEP_SUMMARY"

          assets=()
          while IFS= read -r -d '' file; do
            assets+=("$file")
          done < <(find dist-electron -maxdepth 1 -type f -print0)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist-electron/"
            exit 1
          fi

          for required in latest.yml latest-mac.yml; do
            if ! find dist-electron -maxdepth 1 -name "$required" -print -quit | grep -q .; then
              echo "Missing required file: $required"
              exit 1
            fi
          done

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Replacing existing release for $TAG"
            gh release delete "$TAG" --repo "$REPO" --yes
          fi

          gh release create "$TAG" "${assets[@]}" \
            --repo "$REPO" \
            --title "Build Advisor ${TAG#v}" \
            --generate-notes

          echo "Published ${#assets[@]} assets to $TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify release has Windows and macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"
          ASSETS=$(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\") | .assets[].name" | sort -u)
          echo "$ASSETS"
          echo "$ASSETS" | grep -q 'latest.yml'
          echo "$ASSETS" | grep -q 'latest-mac.yml'
          echo "$ASSETS" | grep -q '\.exe$'
          echo "$ASSETS" | grep -qE '\.dmg$|\.zip$'
          COUNT=$(gh api "repos/$REPO/releases" --jq "[.[] | select(.tag_name==\"$TAG\")] | length")
          if [ "$COUNT" != "1" ]; then
            echo "Expected 1 release for $TAG, found $COUNT"
            exit 1
          fi
