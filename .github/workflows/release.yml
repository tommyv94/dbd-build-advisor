name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish installer
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove incomplete duplicate release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"
          for id in $(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\") | .id"); do
            if ! gh api "repos/$REPO/releases/$id/assets" --jq '.[].name' | grep -qx 'latest.yml'; then
              echo "Deleting incomplete release $id for $TAG"
              gh api -X DELETE "repos/$REPO/releases/$id"
            fi
          done

      - name: Verify release has updater metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')
          echo "$ASSETS"
          echo "$ASSETS" | grep -q 'latest.yml'
          echo "$ASSETS" | grep -q '\.exe$'
