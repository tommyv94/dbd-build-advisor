name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Windows installer
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: build-windows
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish macOS app
        run: npm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  verify-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Remove incomplete duplicate releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"
          for id in $(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\") | .id"); do
            names=$(gh api "repos/$REPO/releases/$id/assets" --jq '.[].name' | tr '\n' ' ')
            echo "Release $id assets: $names"
            if echo "$names" | grep -qE 'latest\.yml|latest-mac\.yml|\.exe|\.dmg|\.zip'; then
              echo "Keeping release $id"
            else
              echo "Deleting incomplete release $id for $TAG"
              gh api -X DELETE "repos/$REPO/releases/$id"
            fi
          done

      - name: Verify release has Windows and macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"
          ASSETS=$(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\") | .assets[].name" | sort -u)
          echo "$ASSETS"
          echo "$ASSETS" | grep -q 'latest.yml'
          echo "$ASSETS" | grep -q 'latest-mac.yml'
          echo "$ASSETS" | grep -q '\.exe$'
          echo "$ASSETS" | grep -qE '\.dmg$|\.zip$'
          COUNT=$(gh api "repos/$REPO/releases" --jq "[.[] | select(.tag_name==\"$TAG\")] | length")
          if [ "$COUNT" != "1" ]; then
            echo "Expected 1 release for $TAG, found $COUNT"
            exit 1
          fi
