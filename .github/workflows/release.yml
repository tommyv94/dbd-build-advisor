name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:desktop:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist-electron/
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build:desktop:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-installer'
          path: dist-electron
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"

          ls -la dist-electron/

          assets=()
          while IFS= read -r -d '' file; do
            assets+=("$file")
          done < <(find dist-electron -maxdepth 1 -type f -print0)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist-electron/"
            exit 1
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Replacing existing release for $TAG"
            gh release delete "$TAG" --repo "$REPO" --yes
          fi

          gh release create "$TAG" "${assets[@]}" \
            --repo "$REPO" \
            --title "Build Advisor ${TAG#v}" \
            --generate-notes

      - name: Verify release has Windows and macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${{ github.repository }}"
          ASSETS=$(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\") | .assets[].name" | sort -u)
          echo "$ASSETS"
          echo "$ASSETS" | grep -q 'latest.yml'
          echo "$ASSETS" | grep -q 'latest-mac.yml'
          echo "$ASSETS" | grep -q '\.exe$'
          echo "$ASSETS" | grep -qE '\.dmg$|\.zip$'
          COUNT=$(gh api "repos/$REPO/releases" --jq "[.[] | select(.tag_name==\"$TAG\")] | length")
          if [ "$COUNT" != "1" ]; then
            echo "Expected 1 release for $TAG, found $COUNT"
            exit 1
          fi
