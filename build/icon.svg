<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="fog" cx="50%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#e02828" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#e02828" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e02828" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- App tile background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#fog)"/>
  <!-- Subtle border -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Entity hex glow -->
  <ellipse cx="256" cy="220" rx="120" ry="100" fill="url(#glow)" filter="url(#soft)"/>
  <!-- Outer hex ring (gold) -->
  <path
    d="M256 108 L372 192 L372 328 L256 412 L140 328 L140 192 Z"
    fill="none"
    stroke="#e8c252"
    stroke-width="6"
    stroke-linejoin="round"
    opacity="0.85"
  />
  <!-- Inner entity hex (blood red) -->
  <path
    d="M256 148 L332 204 L332 316 L256 372 L180 316 L180 204 Z"
    fill="#c01828"
    stroke="#e02828"
    stroke-width="8"
    stroke-linejoin="round"
  />
  <!-- Core -->
  <path
    d="M256 198 L302 232 L302 288 L256 322 L210 288 L210 232 Z"
    fill="#080808"
    stroke="#e02828"
    stroke-width="4"
    stroke-linejoin="round"
  />
  <circle cx="256" cy="260" r="22" fill="#e02828"/>
  <!-- Four perk slots (loadout motif) -->
  <circle cx="128" cy="128" r="18" fill="#5eb8e8" opacity="0.9"/>
  <circle cx="384" cy="128" r="18" fill="#5eb8e8" opacity="0.9"/>
  <circle cx="128" cy="384" r="18" fill="#e8c252" opacity="0.9"/>
  <circle cx="384" cy="384" r="18" fill="#e8c252" opacity="0.9"/>
  <!-- Fog wisps -->
  <path d="M80 420 Q160 400 240 430 T400 420" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="3"/>
  <path d="M112 448 Q200 430 288 452 T440 440" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>
</svg>
